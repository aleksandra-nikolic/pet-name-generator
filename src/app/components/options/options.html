<div class="wrapper">
  <div class="container">
    <h2>Gender</h2>
    <section class="form-gender">
      <input type="radio" name="gender" value="male" id="male" />
      <label for="male">Male</label>

      <input type="radio" name="gender" value="female" id="female" />
      <label for="female">Female</label>

      <input type="radio" name="gender" value="both" id="both" />
      <label for="both">Both</label>
    </section>
    <h2>Style</h2>
    <section class="form-style">
      <input type="checkbox" name="style" value="funny" id="funny" />
      <label for="funny">Funny</label>

      <input type="checkbox" name="style" value="cute" id="cute" />
      <label for="cute">Cute</label>

      <input type="checkbox" name="style" value="classic" id="classic" />
      <label for="classic">Classic</label>

      <input type="checkbox" name="style" value="wild" id="wild" />
      <label for="wild">Wild</label>

      <input type="checkbox" name="style" value="balkans" id="balkans" />
      <label for="balkans">Balkans</label>
    </section>
    <button class="generate-btn" type="submit">Generate name</button>
  </div>
</div>
