<div class="wrapper">
  <div class="container">
    <h2>Gender</h2>
    <section class="form-gender">
      <input (change)="selectGender('male')" type="radio" name="gender" value="male" id="male" />
      <label for="male">Male</label>

      <input
        (change)="selectGender('female')"
        type="radio"
        name="gender"
        value="female"
        id="female"
      />
      <label for="female">Female</label>

      <input (change)="selectGender('both')" type="radio" name="gender" value="both" id="both" />
      <label for="both">Both</label>
    </section>
    <h2>Style</h2>
    <section class="form-style">
      <input
        (change)="selectStyle('funny', $event.target.checked)"
        type="checkbox"
        name="style"
        value="funny"
        id="funny"
      />
      <label for="funny">Funny</label>

      <input
        (change)="selectStyle('cute', $event.target.checked)"
        type="checkbox"
        name="style"
        value="cute"
        id="cute"
      />
      <label for="cute">Cute</label>

      <input
        (change)="selectStyle('classic', $event.target.checked)"
        type="checkbox"
        name="style"
        value="classic"
        id="classic"
      />
      <label for="classic">Classic</label>

      <input
        (change)="selectStyle('wild', $event.target.checked)"
        type="checkbox"
        name="style"
        value="wild"
        id="wild"
      />
      <label for="wild">Wild</label>

      <input
        (change)="selectStyle('balkan', $event.target.checked)"
        type="checkbox"
        name="style"
        value="balkan"
        id="balkan"
      />
      <label for="balkan">Balkan</label>
    </section>
    <button class="generate-btn" type="submit" routerLink="/results" [disabled]="!isFormValid">
      Generate name
    </button>
  </div>
</div>
