<div class="wrapper">
  <div class="container">
    <section class="addBtn">
      <button
        (click)="onClick(); addToFavorites()"
        [ngClass]="{ clicked: isClicked }"
        type="button"
        [disabled]="isClicked"
      >
        Add to Favorites
      </button>
    </section>

    <h1 class="name">{{ randomName }}</h1>

    <section class="againBtns">
      <button (click)="getRandomName()" class="restart">
        <img src="images/refresh.png" alt="" />
      </button>
      <button class="start-again" routerLink="/home">Back to Home</button>
    </section>
  </div>
</div>
