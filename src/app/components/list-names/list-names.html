<div class="modal-container">
  <div (click)="close()" class="overlay"></div>
  <div class="wrapper">
    <button (click)="close()" class="closeBtn">
      <img src="images/close-modal.png" alt="" />
    </button>
    @if (favoriteNames.length > 0) {
      @for (name of favoriteNames; track $index) {
        <section class="name-card">
          <h2>{{ name }}</h2>
          <button (click)="deleteName(name)" class="deleteBtn">
            <img src="images/delete-name.png" alt="" />
          </button>
        </section>
      }
    } @else if (favoriteNames.length === 0) {
      <p class="empty-list">List is empty!</p>
    }
  </div>
</div>
